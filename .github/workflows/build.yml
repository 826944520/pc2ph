name: Build iOS & Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: audiorelay_flutter

jobs:
  # ================================================
  # Static Analysis + Tests
  # ================================================
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        continue-on-error: true
        run: flutter analyze

      - name: Unit tests
        run: flutter test

  # ================================================
  # iOS Build
  # ================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Generate iOS platform files
        run: |
          mkdir -p ios/Runner
          # Use FLUTTER_ROOT from flutter-action instead of parsing Generated.xcconfig
          cat > ios/Podfile << 'PODFILE_EOF'
          platform :ios, '14.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          flutter_root = ENV['FLUTTER_ROOT']
          raise "FLUTTER_ROOT not set" unless flutter_root

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podhelper_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            pod 'opus-ios', '~> 1.1'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
            end
          end
          PODFILE_EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install && cd ..

      - name: Build iOS (unsigned IPA)
        run: flutter build ipa --no-codesign --release

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiorelay-ios-unsigned
          path: audiorelay_flutter/build/ios/ipa/*.ipa

  # ================================================
  # Android Build
  # ================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiorelay-android
          path: audiorelay_flutter/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiorelay-android-aab
          path: audiorelay_flutter/build/app/outputs/bundle/release/app-release.aab
