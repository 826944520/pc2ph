name: audiorelay_client
description: AudioRelay iOS/Android client - Stream PC audio to mobile.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  # Network
  web_socket_channel: ^2.4.0
  # Audio playback (raw PCM)
  flutter_sound: ^9.2.13
  # File system
  path_provider: ^2.1.0
  # Service discovery
  multicast_dns: ^0.3.2
  # State
  provider: ^6.1.0
  # UUID
  uuid: ^4.2.0
  # Permissions
  permission_handler: ^11.1.0
  # FFI
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  ffigen: ^9.0.0

flutter:
  uses-material-design: true

  # Assets if any
  # assets:
  #   - assets/
